apiVersion: v1
kind: Service
metadata:
  name: b-service
  labels:
    app: b-service
spec:
  selector:
    app: b-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: b-service-pdb
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: b-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: b-service
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: b-service
  template:
    metadata:
      labels:
        app: b-service
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: b-service
          image: ghcr.io/example/b-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_SHUTDOWN
              value: graceful
            - name: SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE
              value: 20s
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: health
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: a-service
  labels:
    app: a-service
spec:
  selector:
    app: a-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a-service
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: a-service
  template:
    metadata:
      labels:
        app: a-service
    spec:
      containers:
        - name: a-service
          image: ghcr.io/example/a-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: B_SERVICE_BASE_URL
              value: http://b-service
            - name: A_B_CONNECT_TIMEOUT_MS
              value: "100"
            - name: A_B_READ_TIMEOUT_MS
              value: "250"
            - name: A_B_RETRY_COUNT
              value: "1"
            - name: A_B_RETRY_BACKOFF_MS
              value: "50"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
